name: Build C++ Exe

on:
  push:
    branches: [ main, master ]
    paths:
      - 'cpp/**'
      - '.github/workflows/build-cpp.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'cpp/**'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: cpp
    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.3'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        setup-python: false
        cache: false

    - name: Configure
      shell: pwsh
      run: |
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$env:Qt6_Dir"

    - name: Build
      shell: pwsh
      run: |
        cmake --build build --config Release 2>&1 | Tee-Object -FilePath build/build-log.txt

    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: windows-build-log
        path: cpp/build/build-log.txt

    - name: Deploy Qt DLLs
      shell: pwsh
      run: |
        $exe = Get-ChildItem -Path build/Release -Filter "WSDAutoDrawer.exe" -Recurse | Select-Object -First 1
        if ($exe) {
          & "$env:Qt6_Dir\bin\windeployqt.exe" "$($exe.FullName)" --release
          Write-Host "Deployed: $($exe.FullName)"
        } else {
          $exe2 = Get-ChildItem -Path build -Filter "WSDAutoDrawer.exe" -Recurse | Select-Object -First 1
          if ($exe2) {
            & "$env:Qt6_Dir\bin\windeployqt.exe" "$($exe2.FullName)" --release
            Write-Host "Deployed: $($exe2.FullName)"
          }
        }

    - name: Package
      shell: pwsh
      run: |
        $exe = Get-ChildItem -Path build/Release -Filter "WSDAutoDrawer.exe" -Recurse | Select-Object -First 1
        if (-not $exe) {
          $exe = Get-ChildItem -Path build -Filter "WSDAutoDrawer.exe" -Recurse | Select-Object -First 1
        }
        if ($exe) {
          $dir = Split-Path -Parent $exe.FullName
          Compress-Archive -Path "$dir\*" -DestinationPath "WSDAutoDrawer-Windows.zip" -Force
          Write-Host "Packaged: $dir"
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WSDAutoDrawer-Windows
        path: cpp/WSDAutoDrawer-Windows.zip

  build-linux:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: cpp
    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.3'
        host: 'linux'
        target: 'desktop'
        setup-python: false
        cache: false

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev

    - name: Configure
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WSDAutoDrawer-Linux
        path: cpp/build/WSDAutoDrawer
